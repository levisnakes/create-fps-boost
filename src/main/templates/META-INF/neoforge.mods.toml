modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="icon.png"
authors="levisnakes"
description='''
Client-side adaptive helper for Create-based modpacks (works in any pack).

Minecraft already culls block entities and small entities by distance on its own; this mod watches your real FPS and, only when the game is actually struggling, temporarily tightens those existing limits further, automates the render/entity distance sliders down and back up, and applies a global particle budget (vanilla only caps particles per render layer, not in total). At or above your target FPS it changes nothing beyond vanilla's own behavior.

Type /createfpsboost in-game to see live stats. Fully configurable.
'''

[[mixins]]
config="createfpsboost.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[21.1.0,)"
    ordering="NONE"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="CLIENT"
